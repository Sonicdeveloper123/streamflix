<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="auth-section" style="text-align: center; margin-top: 50px;">
  <h1>Streamflix 2026</h1>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="signUp()">Sign Up</button>
</div>

<div id="video-app-container" style="display:none;">
  <nav>
    <button onclick="logout()">Logout</button>
    <input type="text" id="search" oninput="filterPlaylist()" placeholder="Search movies...">
  </nav>
  
  <div class="player-layout">
    <video id="mainVideo" controls width="800"></video>
    <h2 id="videoTitle"></h2>
    <p id="videoDesc"></p>
    
    <div id="playlist"></div>
  </div>
</div>
<link rel="stylesheet" href="movie.html">
<script src="script.js"></script>
</body>
</html>
